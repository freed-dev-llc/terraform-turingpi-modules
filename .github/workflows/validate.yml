name: Terraform Validate

on:
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '.tflint.hcl'
      - '.github/workflows/validate.yml'

# Read-only: this workflow only runs terraform fmt/validate + tflint + trivy.
# No commits, no PR comments, no deploys. Closes CodeQL alerts #9 and #12
# (actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: [self-hosted, linux]

    strategy:
      fail-fast: false
      matrix:
        module:
          - modules/flash-nodes
          - modules/k3s-cluster
          - modules/talos-cluster
          - modules/talos-image
          - modules/addons/cert-manager
          - modules/addons/ingress-nginx
          - modules/addons/longhorn
          - modules/addons/metallb
          - modules/addons/monitoring
          - modules/addons/portainer

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      # Defensive: the self-hosted runner's $HOME is persistent across jobs.
      # Other workflows (e.g. terraform-provider-turingpi's cli-smoketest)
      # write dev_overrides into ~/.terraformrc that reference per-run $RUNNER_TEMP
      # paths long since gone, which then break `terraform init` here with
      # "could not read package directory". Remove any leaked CLI config.
      - name: Purge any leaked CLI config
        run: rm -f ~/.terraformrc ~/.tofurc

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.module }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ matrix.module }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.module }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: TFLint Init
        run: tflint --init --config "$GITHUB_WORKSPACE/.tflint.hcl"
        working-directory: ${{ matrix.module }}

      - name: TFLint
        run: tflint --config "$GITHUB_WORKSPACE/.tflint.hcl" --format compact
        working-directory: ${{ matrix.module }}

  security:
    name: Security Scan
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          trivy-config: trivy.yaml
          exit-code: 1
