name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      options:
        - flash-nodes
        - talos-cluster
        - k3s-cluster
        - metallb
        - ingress-nginx
        - longhorn
        - monitoring
        - portainer
        - Other
    validations:
      required: true
  - type: input
    id: module-version
    attributes:
      label: Module Version
  - type: input
    id: terraform-version
    attributes:
      label: Terraform Version
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
  - type: textarea
    id: terraform-config
    attributes:
      label: Terraform Configuration
      description: Relevant module configuration.
      render: hcl
  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      render: shell
